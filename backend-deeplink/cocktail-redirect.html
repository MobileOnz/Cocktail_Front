<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONZ 칵테일</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a1a;
      font-family: -apple-system, sans-serif;
      color: #fff;
      text-align: center;
      padding: 0 24px;
      box-sizing: border-box;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
    p  { font-size: 14px; color: #aaa; margin: 0 0 32px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: #313131;
      border: 1px solid #555;
      cursor: pointer;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #444;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">🍸</div>
  <h1 id="title">ONZ에서 열고 있습니다...</h1>
  <p id="desc">잠시만 기다려주세요</p>
  <div class="spinner" id="spinner"></div>
  <a class="btn" id="store-btn" style="display:none"></a>

  <script>
    (function () {
      // URL에서 cocktailId 추출: /cocktail/42 → 42
      var pathParts = window.location.pathname.split('/');
      var cocktailId = pathParts[pathParts.length - 1];

      var isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      var isAndroid = /Android/.test(navigator.userAgent);

      // ── 스토어 URL (앱 출시 후 실제 URL로 교체) ──────────────────────
      var APP_STORE_URL  = 'https://apps.apple.com/kr/app/onz/id6744957084';
      var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.cocktail_front';
      // ─────────────────────────────────────────────────────────────────

      var appScheme = 'onzcocktail://cocktail/' + cocktailId;

      function showStoreButton() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = '앱을 설치하고 확인해보세요!';
        document.getElementById('desc').textContent  = '칵테일 정보를 ONZ 앱에서 더 자세히 볼 수 있어요.';

        var btn = document.getElementById('store-btn');
        btn.style.display = 'inline-block';

        if (isIOS) {
          btn.href        = APP_STORE_URL;
          btn.textContent = 'App Store에서 다운로드';
        } else if (isAndroid) {
          btn.href        = PLAY_STORE_URL;
          btn.textContent = 'Play Store에서 다운로드';
        } else {
          btn.style.display = 'none';
        }
      }

      if (!isIOS && !isAndroid) {
        // PC: 앱이 없으니 바로 스토어 버튼 표시
        showStoreButton();
        return;
      }

      // 모바일: 앱 실행 시도 → 1.5초 후 앱이 안 열렸으면 스토어 이동
      var timeout = setTimeout(showStoreButton, 1500);

      // 앱이 열리면 페이지가 blur 됨 → 타이머 취소
      window.addEventListener('blur', function () {
        clearTimeout(timeout);
      });

      window.location.href = appScheme;
    })();
  </script>
</body>
</html>
