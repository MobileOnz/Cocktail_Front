name: CI (Onz_Android/Onz_IOS/main) # 배포 전 aab, apk 파일 생성 후 디자이너 전달용
# 추후 IOS 연동을 통해 즉각 피드백 요청 예정

on:
  push:
    branches: [Onz_Android, Onz_IOS, main]
  pull_request:
    branches: [Onz_Android, Onz_IOS, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 소스 체크아웃
      - uses: actions/checkout@v4

      # 2️⃣ Node 환경 설정 (npm 캐시 포함)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3️⃣ npm 설치
      - name: Install dependencies
        run: npm install --ignore-scripts

      # 4️⃣ Lint
      - name: Lint
        run: npm run lint --if-present

      # 5️⃣ Type Check (TypeScript)
      - name: Type Check
        run: npm run tsc --if-present -- --noEmit

      # 6️⃣ (옵션) Unit Test
      # - name: Unit Test
      #   run: npm test --if-present -- --ci --coverage

      # 7️⃣ Java 환경 설정 (Gradle 빌드용)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 8️⃣ Gradle 캐시
      - name: Gradle cache
        uses: gradle/gradle-build-action@v3

      # 9️⃣ Android 빌드 (릴리즈 서명은 cd-prod.yml에서 처리)
      - name: Build Android
        run: cd android && ./gradlew assembleDebug

          
      - name: Prepare Safe Artifact Name
        run: |
          SAFE_NAME="${GITHUB_REF_NAME//\//-}"
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo " Using artifact name: android-$SAFE_NAME"


      # 🔟 결과물 업로드 (APK/AAB)
      - name: Upload APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ env.SAFE_NAME }} 
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
