name: CD – QA (Firebase App Distribution + TestFlight)

on:
  push:
    branches: [Onz_Android]

concurrency:
  group: cd-qa
  cancel-in-progress: true

# ────────────────────────────────────────────────
# 필요한 GitHub Secrets
# ────────────────────────────────────────────────
# [Android]
#   ANDROID_KEYSTORE_BASE64         - base64로 인코딩한 .jks 파일
#                                     (macOS/Linux) base64 -i android/app/my-release-key.jks | pbcopy
#   ANDROID_STORE_PASSWORD          - 키스토어 비밀번호
#   ANDROID_KEY_ALIAS               - 키 별칭 (my-key-alias)
#   ANDROID_KEY_PASSWORD            - 키 비밀번호
#   FIREBASE_TOKEN                  - firebase login:ci 로 발급
#   FIREBASE_ANDROID_APP_ID         - 1:513269758316:android:8f3b11afa11de306391b49
#
# [iOS]
#   IOS_DIST_CERT_P12_BASE64        - 배포용 .p12 인증서 base64
#   IOS_DIST_CERT_PASSWORD          - .p12 비밀번호
#   IOS_APP_STORE_PROFILE_BASE64    - App Store 배포 프로비저닝 프로파일 base64
#   APPLE_TEAM_ID                   - Apple Developer Team ID
#   APP_STORE_CONNECT_API_KEY_ID    - ASC API Key ID
#   APP_STORE_CONNECT_API_ISSUER_ID - ASC API Issuer ID
#   APP_STORE_CONNECT_API_KEY_CONTENT - .p8 파일 내용 (-----BEGIN PRIVATE KEY----- 포함)
# ────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────
  # Android → Firebase App Distribution
  # ──────────────────────────────────────────────
  android-firebase:
    name: Android → Firebase App Distribution
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PATH: my-release-key.jks
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm install --ignore-scripts

      - name: Apply patches
        run: npx patch-package

      - name: Create .env file
        run: |
          echo "API_BASE_URL=http://onz-cocktail.kr/onz" >> .env
          echo "GOOGLE_PLACES_API_KEY=AIzaSyDeWHr3QIavBa4RGYwZly8h0sNTfLmQ" >> .env
          echo "GOOGLE_CLIENT_ID=1058340377075-vt8u6qabph0f0van79eqhkt9j2f1jkbe.apps.googleusercontent.com" >> .env
          echo "GOOGLE_REDIRECT_URI=com.googleusercontent.apps.1058340377075-vt8u6qabph0f0van79eqhkt9j2f1jkbe:/oauth2redirect/google" >> .env

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure NDK (use pre-installed 28.2.13676358)
        run: |
          printf 'sdk.dir=%s\nndk.dir=%s/ndk/28.2.13676358\n' \
            "${ANDROID_HOME}" "${ANDROID_HOME}" > android/local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d ' \r\n' | base64 -d > android/app/my-release-key.jks

      - name: Build Release APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: cd android && ./gradlew assembleRelease --no-daemon --no-configuration-cache

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}

  # ──────────────────────────────────────────────
  # iOS → TestFlight
  # ──────────────────────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    runs-on: macos-latest

    env:
      NODE_OPTIONS: "--max-old-space-size=16384"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm install --ignore-scripts

      - name: Apply patches
        run: npx patch-package

      - name: Create .env file
        run: |
          echo "API_BASE_URL=http://onz-cocktail.kr/onz" >> .env
          echo "GOOGLE_PLACES_API_KEY=AIzaSyDeWHr3QIavBa4RGYwZly8h0sNTfLmQ" >> .env
          echo "GOOGLE_CLIENT_ID=1058340377075-vt8u6qabph0f0van79eqhkt9j2f1jkbe.apps.googleusercontent.com" >> .env
          echo "GOOGLE_REDIRECT_URI=com.googleusercontent.apps.1058340377075-vt8u6qabph0f0van79eqhkt9j2f1jkbe:/oauth2redirect/google" >> .env

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: latest
          bundler-cache: true

      - name: Install CocoaPods
        run: bundle exec pod install --no-repo-update --project-directory=ios

      - name: Import distribution certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dist.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/ios-build.keychain
          KEYCHAIN_PASS=$(openssl rand -base64 20)

          echo "$CERT_BASE64" | python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().replace('\n','').replace('\r','').replace(' ','')))" > $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security import $CERT_PATH \
            -P "${{ secrets.IOS_DIST_CERT_PASSWORD }}" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db
          security default-keychain -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

      - name: Import provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().replace('\n','').replace('\r','').replace(' ','')))" > $PP_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" \
            /dev/stdin <<< $(security cms -D -i $PP_PATH))

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          echo "PROVISIONING_PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Configure Xcode signing (main target only)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning
          echo "=== Provisioning profile UUID ==="
          echo "$PROVISIONING_PROFILE_UUID"
          cd ios
          bundle exec ruby << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Cocktail_Front.xcodeproj')
          target = project.targets.find { |t| t.name == 'Cocktail_Front' }
          config = target.build_configurations.find { |c| c.name == 'Release' }
          config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
          config.build_settings['PROVISIONING_PROFILE'] = ENV['PROVISIONING_PROFILE_UUID']
          config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ENV['PROVISIONING_PROFILE_UUID']
          config.build_settings['CODE_SIGN_IDENTITY'] = 'iPhone Distribution'
          config.build_settings['DEVELOPMENT_TEAM'] = ENV['APPLE_TEAM_ID']
          project.save
          puts "Signing configured: target=#{target.name}, profile=#{ENV['PROVISIONING_PROFILE_UUID']}, team=#{ENV['APPLE_TEAM_ID']}"
          RUBY

      - name: Set build number
        run: |
          cd ios
          agvtool new-version -all $GITHUB_RUN_NUMBER

      - name: Pre-bundle JS (validate before archive)
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output /tmp/ios-main.jsbundle \
            --assets-dest /tmp/ios-assets

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/Cocktail_Front.xcworkspace \
            -scheme Cocktail_Front \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/Cocktail_Front.xcarchive

      - name: Export IPA (app-store)
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>iPhone Distribution</string>
            <key>provisioningProfiles</key><dict>
              <key>org.reactjs.native.example.Cocktail-Front</key><string>${PROVISIONING_PROFILE_UUID}</string>
            </dict>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Cocktail_Front.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload to TestFlight
        env:
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_CONTENT" | python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().replace('\n','').replace('\r','').replace(' ','')))" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file $(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1) \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain ${{ env.KEYCHAIN_PATH }} 2>/dev/null || true
