name: CD – QA (Firebase App Distribution + TestFlight)

on:
  push:
    branches: [Onz_Android]

concurrency:
  group: cd-qa
  cancel-in-progress: true

# ────────────────────────────────────────────────
# 필요한 GitHub Secrets
# ────────────────────────────────────────────────
# [Android]
#   ANDROID_KEYSTORE_BASE64         - base64로 인코딩한 .jks 파일
#                                     (macOS/Linux) base64 -i android/app/my-release-key.jks | pbcopy
#   ANDROID_STORE_PASSWORD          - 키스토어 비밀번호
#   ANDROID_KEY_ALIAS               - 키 별칭 (my-key-alias)
#   ANDROID_KEY_PASSWORD            - 키 비밀번호
#   FIREBASE_TOKEN                  - firebase login:ci 로 발급
#   FIREBASE_ANDROID_APP_ID         - 1:513269758316:android:8f3b11afa11de306391b49
#
# [iOS]
#   IOS_DIST_CERT_P12_BASE64        - 배포용 .p12 인증서 base64
#   IOS_DIST_CERT_PASSWORD          - .p12 비밀번호
#   IOS_APP_STORE_PROFILE_BASE64    - App Store 배포 프로비저닝 프로파일 base64
#   APPLE_TEAM_ID                   - Apple Developer Team ID
#   APP_STORE_CONNECT_API_KEY_ID    - ASC API Key ID
#   APP_STORE_CONNECT_API_ISSUER_ID - ASC API Issuer ID
#   APP_STORE_CONNECT_API_KEY_CONTENT - .p8 파일 내용 (-----BEGIN PRIVATE KEY----- 포함)
# ────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────
  # Android → Firebase App Distribution
  # ──────────────────────────────────────────────
  android-firebase:
    name: Android → Firebase App Distribution
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PATH: my-release-key.jks
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/gradle-build-action@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d ' \r\n' | base64 -d > android/app/my-release-key.jks

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}

  # ──────────────────────────────────────────────
  # iOS → TestFlight
  # ──────────────────────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: latest
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          bundle exec pod update hermes-engine --no-repo-update --project-directory=ios
          bundle exec pod install --project-directory=ios

      - name: Import distribution certificate
        run: |
          CERT_PATH=$RUNNER_TEMP/dist.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/ios-build.keychain
          KEYCHAIN_PASS=$(openssl rand -base64 20)

          echo "${{ secrets.IOS_DIST_CERT_P12_BASE64 }}" | tr -d ' \r\n' | openssl base64 -A -d -out $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security import $CERT_PATH \
            -P "${{ secrets.IOS_DIST_CERT_PASSWORD }}" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

      - name: Import provisioning profile
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "${{ secrets.IOS_APP_STORE_PROFILE_BASE64 }}" | tr -d ' \r\n' | openssl base64 -A -d -out $PP_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" \
            /dev/stdin <<< $(security cms -D -i $PP_PATH))

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          echo "PROVISIONING_PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/Cocktail_Front.xcworkspace \
            -scheme Cocktail_Front \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Cocktail_Front.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROVISIONING_PROFILE_UUID" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            -quiet

      - name: Export IPA (app-store)
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Cocktail_Front.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload to TestFlight
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" > $RUNNER_TEMP/api_key.p8

          xcrun altool --upload-app \
            --type ios \
            --file $(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1) \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
            --private-key @$RUNNER_TEMP/api_key.p8

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain ${{ env.KEYCHAIN_PATH }} 2>/dev/null || true
